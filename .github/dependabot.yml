version: 2

updates:
  - package-ecosystem: "docker"
    directories:
      - "/"
      - "/charts/nr-metabase"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "America/Vancouver"
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
    groups:
      metabase:
        group-by: dependency-name
        patterns:
          - "metabase/metabase"
      infrastructure:
        group-by: dependency-name
        patterns:
          - "*"
        exclude-patterns:
          - "metabase/metabase"
    ignore:
      # Keep the pinned JDK base image stable while still updating other images.
      - dependency-name: "eclipse-temurin"
      # Suppress Docker patch bumps for non-Metabase container images.
      - dependency-name: "artifacts.developer.gov.bc.ca/github-docker-remote/bcgov/nr-containers/postgres"
        update-types:
          - "version-update:semver-patch"
      - dependency-name: "bcgovimages/backup-container"
        update-types:
          - "version-update:semver-patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "America/Vancouver"
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"